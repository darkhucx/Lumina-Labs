<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.summary | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    // apply saved theme before paint (default light, like nomod)
    try { if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark'); } catch (e) {}
  </script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="topnav">
        <a href="{{ '/' | relative_url }}">文章</a>
        <a href="{{ '/about/' | relative_url }}">关于</a>
        <button class="theme-toggle" type="button" aria-label="切换深浅色">◐</button>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-foot">
    <div class="foot-inner">
      <div class="foot-brand">
        <span class="brand">{{ site.title }}</span>
        <p>{{ site.description }}</p>
      </div>
      <div class="foot-cols">
        <div class="foot-col">
          <h4>页面</h4>
          <a href="{{ '/' | relative_url }}">文章</a>
          <a href="{{ '/about/' | relative_url }}">关于</a>
        </div>
        <div class="foot-col">
          <h4>源</h4>
          {% if site.github_url %}<a href="{{ site.github_url }}" target="_blank" rel="noopener">GitHub</a>{% endif %}
        </div>
      </div>
    </div>
    <div class="foot-bottom">
      <span>© 2026 {{ site.title }} · 内容采自公开来源，机器翻译 + 人工质检</span>
      <a href="#top" class="to-top">回到顶部 ↑</a>
    </div>
  </footer>

  <script>
    (function () {
      var btn = document.querySelector('.theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var dark = document.documentElement.classList.toggle('dark');
        try { localStorage.setItem('theme', dark ? 'dark' : 'light'); } catch (e) {}
      });
    })();
  </script>
</body>
</html>

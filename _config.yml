title: Lumina Labs
tagline: AI FRONTIER · 中文摘译
description: 自动采集 AI 前沿博客，机器翻译 + 人工质检后发布的中文摘译。
hero_title: AI 前沿动态，中文摘译
hero_subtitle: 自动采集前沿 AI 博客，机器翻译 + 人工质检，每日精选呈现。
github_url: https://github.com/darkhucx/Lumina-Labs
baseurl: "/Lumina-Labs"
url: "https://darkhucx.github.io"
permalink: /:year/:month/:day/:title/
markdown: kramdown
kramdown:
  input: GFM
timezone: Asia/Tokyo
# vault notes carry no `layout` key — apply it by default so publish.sh can copy
# them verbatim. _posts/ holds ONLY vault-synced published notes (publish.sh
# wipes & rebuilds it each run); evergreen pages like about.md are NOT posts.
defaults:
  - scope: { path: "", type: posts }
    values: { layout: post }
# Status filtering happens upstream in publish.sh (only status:published notes
# ever land in _posts/), so Jekyll needs no where-filter and no plugins here.
exclude:
  - publish.sh
  - README.md
  - Makefile
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .github/

name: Build & Deploy (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

# _posts/ already contains ONLY status:published notes (publish.sh filters
# upstream), so the build needs no status filtering — just build & deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; cancel superseded runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Jekyll build
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
